spring:
  application:
    name: edwin_ai_agent
  profiles:
    active: local
  ai:
    mcp:
      client:
        stdio: #这个只包含了std模式，另外的sse模式没有设置
          servers-configuration: classpath:mcp-servers.json

server:
  port: 8123
  servlet:
    context-path: /api

# springdoc-openapi????
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.edwin.edwin_ai_agent.controller
# knife4j???????????????
knife4j:
  enable: true
  setting:
    language: zh_cn

# searchApi
search-api:
  api-key: 你的 API Key
