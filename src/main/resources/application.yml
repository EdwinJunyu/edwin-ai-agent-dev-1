spring:
  application:
    name: edwin_ai_agent_v2
  profiles:
    active: local

server:
  port: 8125
  servlet:
    context-path: /api

# springdoc-openapi????
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.edwin.edwin_ai_agent_v2.controller
# knife4j???????????????
knife4j:
  enable: true
  setting:
    language: zh_cn

